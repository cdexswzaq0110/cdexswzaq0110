  <text x="483" y="287" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">IoT</text>

  <!-- Neural network diagram -->
  <g transform="translate(650,58)">
    <!-- edges: input to hidden1 -->
    <line x1="40" y1="40" x2="170" y2="24" stroke="#9ca3af" stroke-width="2"/>
    <line x1="40" y1="40" x2="170" y2="82" stroke="#c0c7d1" stroke-width="2"/>
    <line x1="40" y1="40" x2="170" y2="140" stroke="#d1d5db" stroke-width="2"/>

    <line x1="40" y1="100" x2="170" y2="24" stroke="#c0c7d1" stroke-width="2"/>
    <line x1="40" y1="100" x2="170" y2="82" stroke="#2563eb" stroke-width="2.4"/>
    <line x1="40" y1="100" x2="170" y2="140" stroke="#c0c7d1" stroke-width="2"/>

    <line x1="40" y1="160" x2="170" y2="24" stroke="#d1d5db" stroke-width="2"/>
    <line x1="40" y1="160" x2="170" y2="82" stroke="#c0c7d1" stroke-width="2"/>
    <line x1="40" y1="160" x2="170" y2="140" stroke="#9ca3af" stroke-width="2"/>

