    <circle cx="300" cy="126" r="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>

    <!-- output layer -->
    <circle cx="430" cy="82" r="13" fill="#dbeafe" stroke="#2563eb" stroke-width="2.8"/>

