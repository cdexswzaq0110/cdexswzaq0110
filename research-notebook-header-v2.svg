    <!-- edges: hidden2 to output -->
    <line x1="300" y1="54" x2="430" y2="82" stroke="#2563eb" stroke-width="2.4"/>
    <line x1="300" y1="126" x2="430" y2="82" stroke="#2563eb" stroke-width="2.4"/>

    <!-- input layer -->
