  <rect x="228" y="265" width="115" height="32" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="253" y="287" font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">Algorithms</text>
  <rect x="357" y="265" width="89" height="32" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
